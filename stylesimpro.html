<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Styles d'Improvisation - Guide</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles_guide.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Guide des Styles d'Improvisation</h1>
            <p>Découvrez les différents styles et techniques d'improvisation utilisés dans le jeu.</p>
            <button id="back-btn" class="back-button">Retour au jeu</button>
        </header>
        <main id="styles-container">
            <!-- Barre de recherche -->
            <div class="search-bar">
                <input type="text" id="style-search" placeholder="Rechercher un style… (3 lettres min.)" autocomplete="off" spellcheck="false">
                <button id="search-reset" class="search-reset-btn" aria-label="Effacer la recherche">✕</button>
            </div>
            <p id="search-empty" class="search-empty hidden">Aucun style ne correspond à cette recherche.</p>

            <!-- Tableau des styles -->
            <section>
                <table id="styles-table">
                    <thead>
                        <tr>
                            <th>Style d'improvisation</th>
                            <th>Brève explication</th>
                        </tr>
                    </thead>
                    <tbody id="styles-body">
                        <!-- Les données seront injectées ici par JavaScript -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <script src="styles_guide.js"></script>
    <script>
        // Gestionnaire pour le bouton retour
        document.getElementById('back-btn').addEventListener('click', () => {
            if (window.self !== window.top) {
                window.parent.postMessage('close-styles-drawer', '*');
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
